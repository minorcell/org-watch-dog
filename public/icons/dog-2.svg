<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Perked triangular ears -->
  <path d="M7 8 L10 2 L14 9 Z" fill="#1a1a1a" />
  <path d="M25 8 L22 2 L18 9 Z" fill="#1a1a1a" />
  <!-- Face -->
  <ellipse cx="16" cy="17" rx="10" ry="8.5" fill="#1a1a1a" />
  <!-- Muzzle highlight -->
  <ellipse cx="16" cy="19" rx="6" ry="4.5" fill="#fff" opacity="0.12" />
  <!-- Nose -->
  <ellipse cx="16" cy="18" rx="2.5" ry="2" fill="#0a0a0a" />
  <!-- Eyes -->
  <circle cx="11" cy="14" r="1.8" fill="#fff" />
  <circle cx="21" cy="14" r="1.8" fill="#fff" />
  <!-- Pupils -->
  <circle cx="11" cy="14" r="0.8" fill="#1a1a1a" />
  <circle cx="21" cy="14" r="0.8" fill="#1a1a1a" />
  <!-- Eyebrows -->
  <line x1="9" y1="11" x2="13" y2="12" stroke="#fff" stroke-width="0.8" opacity="0.5" />
  <line x1="23" y1="11" x2="19" y2="12" stroke="#fff" stroke-width="0.8" opacity="0.5" />
  <!-- Mouth -->
  <path d="M13 21 Q16 24 19 21" stroke="#fff" stroke-width="0.5" opacity="0.4" fill="none" />
</svg>
