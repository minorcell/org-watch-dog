<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Standing ears, alert -->
  <path d="M9 8 L11 1 L14 8 Z" fill="#1a1a1a" />
  <path d="M23 8 L21 1 L18 8 Z" fill="#1a1a1a" />
  <!-- Head -->
  <ellipse cx="16" cy="17" rx="9.5" ry="9" fill="#1a1a1a" />
  <!-- Snout -->
  <ellipse cx="16" cy="22" rx="5.5" ry="3.5" fill="#2a2a2a" />
  <!-- Nose -->
  <ellipse cx="16" cy="20.5" rx="2.2" ry="1.6" fill="#0a0a0a" />
  <!-- Eyes -->
  <circle cx="11.5" cy="15" r="1.6" fill="#fff" />
  <circle cx="20.5" cy="15" r="1.6" fill="#fff" />
  <!-- Glasses - thick frames -->
  <rect x="8.5" y="12.5" width="6" height="5" rx="1.5" stroke="#fff" stroke-width="0.8" fill="none" />
  <rect x="17.5" y="12.5" width="6" height="5" rx="1.5" stroke="#fff" stroke-width="0.8" fill="none" />
  <line x1="14.5" y1="15" x2="17.5" y2="15" stroke="#fff" stroke-width="0.8" />
  <!-- Glasses temple -->
  <line x1="8.5" y1="14" x2="5" y2="12" stroke="#fff" stroke-width="0.6" opacity="0.6" />
  <line x1="23.5" y1="14" x2="27" y2="12" stroke="#fff" stroke-width="0.6" opacity="0.6" />
  <!-- Smile -->
  <path d="M12 21 Q16 24 20 21" stroke="#fff" stroke-width="0.6" opacity="0.3" fill="none" />
</svg>
