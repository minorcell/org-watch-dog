<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Droopy ears -->
  <path d="M4 4 Q6 0 8 6 Q8 14 6 16 Q4 18 4 10 Z" fill="#1a1a1a" />
  <path d="M28 4 Q26 0 24 6 Q24 14 26 16 Q28 18 28 10 Z" fill="#1a1a1a" />
  <!-- Head -->
  <ellipse cx="16" cy="16" rx="10" ry="9" fill="#1a1a1a" />
  <!-- Snout -->
  <ellipse cx="16" cy="20" rx="5" ry="3.5" fill="#2a2a2a" />
  <!-- Nose -->
  <ellipse cx="16" cy="18.5" rx="2.5" ry="1.8" fill="#0a0a0a" />
  <!-- Nostrils -->
  <circle cx="15" cy="18.5" r="0.4" fill="#444" />
  <circle cx="17" cy="18.5" r="0.4" fill="#444" />
  <!-- Eyes -->
  <circle cx="11.5" cy="14" r="1.5" fill="#fff" />
  <circle cx="20.5" cy="14" r="1.5" fill="#fff" />
  <!-- Monocle (single lens) -->
  <circle cx="16" cy="14" r="6" stroke="#fff" stroke-width="0.6" fill="none" />
  <!-- Bridge -->
  <line x1="13" y1="14" x2="11.5" y2="14" stroke="#fff" stroke-width="0.6" />
  <line x1="19" y1="14" x2="20.5" y2="14" stroke="#fff" stroke-width="0.6" />
  <!-- Tongue -->
  <ellipse cx="16" cy="23" rx="2" ry="1.8" fill="#ff6b6b" />
  <!-- Tail wag -->
  <path d="M26 6 Q30 2 28 8" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>
