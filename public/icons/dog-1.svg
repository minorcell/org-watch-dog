<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Round floppy ears -->
  <ellipse cx="7" cy="8" rx="5" ry="7" fill="#1a1a1a" />
  <ellipse cx="25" cy="8" rx="5" ry="7" fill="#1a1a1a" />
  <!-- Head -->
  <ellipse cx="16" cy="17" rx="10" ry="9" fill="#1a1a1a" />
  <!-- Snout -->
  <ellipse cx="16" cy="22" rx="5" ry="3.5" fill="#2a2a2a" />
  <!-- Nose -->
  <ellipse cx="16" cy="21" rx="2" ry="1.5" fill="#0a0a0a" />
  <!-- Eyes -->
  <circle cx="12" cy="15" r="1.5" fill="#fff" />
  <circle cx="20" cy="15" r="1.5" fill="#fff" />
  <!-- Glasses -->
  <rect x="8.5" y="12.5" width="7" height="5" rx="2" stroke="#fff" stroke-width="0.7" fill="none" />
  <rect x="16.5" y="12.5" width="7" height="5" rx="2" stroke="#fff" stroke-width="0.7" fill="none" />
  <line x1="15.5" y1="15" x2="16.5" y2="15" stroke="#fff" stroke-width="0.7" />
  <!-- Tongue -->
  <ellipse cx="16" cy="25" rx="2" ry="1.5" fill="#ff6b6b" />
</svg>
